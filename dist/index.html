<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>毛孩同行 | 首頁</title>
        <meta
            name="description"
            content="「毛孩同行」是一個由志同道合的狗友自發組成的私人團體，致力於寵物寄養、臨時照護與浪浪救助。我們用愛與責任陪伴每隻毛孩，協助牠們安全過渡、找到溫暖的新家。"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        />
        <link rel="stylesheet" href="css/lib/animate.min.css" />
        <link rel="stylesheet" href="./css/index.css" />
    </head>

    <body>
        <div id="header-endpoint"></div>
        <div class="banner">
            <div class="swiper-wrap" id="swiper-app" v-cloak>
                <div
                    class="swiper animate__animated"
                    :class="{animate__lightSpeedInLeft: action === 'in', animate__fadeOutRightBig: action === 'out'}"
                    :style="{backgroundImage: `url(${item.backgroundImage})`}"
                >
                    <div class="wrap animate__animated" :class="actionAnimationClass()">
                        <div class="title">{{item.title}}</div>
                        <div class="content">{{item.content}}</div>
                        <div class="btn-wrap">
                            <a :href="item.btnLink" class="btn">{{item.btn}}</a>
                        </div>
                    </div>
                    <div class="navigation">
                        <div class="swiper-button-prev" @click="setPrevCurrentIndex()">
                            <i class="fa-solid fa-caret-left"></i>
                        </div>
                        <div class="swiper-button-next" @click="setNextCurrentIndex()">
                            <i class="fa-solid fa-caret-right"></i>
                        </div>
                    </div>
                    <div class="pagination">
                        <template v-for="(item, index) in items" :key="index">
                            <span
                                class="swiper-pagination-bullet"
                                :class="{active: index === currentIndex}"
                                @click="setCurrentIndex(index)"
                            ></span>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <div class="announcement">
            <div class="container">
                <div class="title">最新公告</div>
                <div class="list">
                    <div class="item">
                        <ul class="content-group" id="announcement-app">
                            <div class="content-wrap">
                                <li v-for="item in announcementList" :key="item.id">
                                    <span class="date">{{item.date}}</span>
                                    <span class="sub-title">{{item.category}}</span>
                                    <span class="content">{{item.content}}</span>
                                </li>
                            </div>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="idea">
            <div class="container">
                <h2 class="title">理念</h2>
                <div class="list">
                    <div class="item">
                        <div class="item-content">
                            <div class="picture">
                                <img src="./images/index/1.jpg" alt="" />
                            </div>
                            <div class="item-wrap">
                                <div class="item-title">傳遞愛心</div>
                                <div class="content">
                                    由志同道合的狗友共同發起，以「領養代替購買」為理念。
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="item">
                        <div class="item-content">
                            <div class="picture">
                                <img src="./images/index/4.jpg" alt="" />
                            </div>
                            <div class="item-wrap">
                                <div class="item-title">愛心陪伴</div>
                                <div class="content">將毛孩視同家人般守護。</div>
                            </div>
                        </div>
                    </div>
                    <div class="item">
                        <div class="item-content">
                            <div class="picture">
                                <img src="./images/index/3.jpg" alt="" />
                            </div>
                            <div class="item-wrap">
                                <div class="item-title">流浪救助</div>
                                <div class="content">幫助浪浪，提供居所與食物。</div>
                            </div>
                        </div>
                    </div>
                    <div class="item">
                        <div class="item-content">
                            <div class="picture">
                                <img src="./images/index/2.jpg" alt="" />
                            </div>
                            <div class="item-wrap">
                                <div class="item-title">安心環境</div>
                                <div class="content">提供舒適的環境，供毛孩休息玩耍。</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="footer-endpoint"></div>
    </body>
    <script src="js/lib/vue.global.prod.js"></script>
    <script type="module" src="./js/index.js"></script>
</html>
